{% extends "base.html" %}

{% block title %}Login - Telegram Stremio{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-6">
        <div class="app-panel p-6 text-center">
            <h2 class="text-3xl font-bold">Admin Login</h2>
            <p class="mt-2 theme-text-secondary text-sm">Sign in to manage streams, access and subscriptions.</p>
        </div>

        {% if error %}
        <div class="bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 rounded-lg">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="app-panel p-8 space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium mb-2">Username</label>
                <input type="text" id="username" name="username" required class="theme-input w-full px-3 py-2 rounded-md">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" required class="theme-input w-full px-3 py-2 rounded-md">
            </div>

            <button type="submit" class="w-full bg-primary hover:opacity-90 text-white py-2.5 px-4 rounded-md transition-opacity font-medium shadow-sm">
                Sign In
            </button>
        </form>

        <div class="text-center text-sm theme-text-secondary">
            Public pages:
            <a href="/status" class="text-primary hover:underline">System Status</a> |
            <a href="/stremio" class="text-primary hover:underline">Stremio Guide</a>
        </div>
    </div>
</div>
{% endblock %}
