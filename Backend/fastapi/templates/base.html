<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram Stremio{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '{{ theme.colors.primary }}',
                        secondary: '{{ theme.colors.secondary }}',
                        accent: '{{ theme.colors.accent }}',
                        background: '{{ theme.colors.background }}',
                        card: '{{ theme.colors.card }}',
                        text: '{{ theme.colors.text }}',
                        'text-secondary': '{{ theme.colors.text_secondary }}'
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background:
                radial-gradient(1200px 500px at 10% -10%, {{ theme.colors.primary }}1F, transparent),
                radial-gradient(900px 400px at 90% -15%, {{ theme.colors.accent }}1A, transparent),
                {{ theme.colors.background }};
            color: {{ theme.colors.text }};
        }

        .theme-card {
            background-color: {{ theme.colors.card }};
            color: {{ theme.colors.text }};
        }

        .theme-text-secondary { color: {{ theme.colors.text_secondary }}; }

        .app-panel {
            background-color: color-mix(in srgb, {{ theme.colors.card }} 92%, #ffffff 8%);
            border: 1px solid color-mix(in srgb, {{ theme.colors.text }} 15%, transparent);
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.14);
        }

        .theme-input {
            background-color: color-mix(in srgb, {{ theme.colors.card }} 86%, #ffffff 14%);
            color: {{ theme.colors.text }};
            border: 1px solid color-mix(in srgb, {{ theme.colors.text }} 22%, transparent);
        }

        .theme-input::placeholder {
            color: color-mix(in srgb, {{ theme.colors.text_secondary }} 88%, transparent);
        }

        .theme-input:focus {
            outline: none;
            border-color: {{ theme.colors.primary }};
            box-shadow: 0 0 0 3px color-mix(in srgb, {{ theme.colors.primary }} 20%, transparent);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <nav class="sticky top-0 z-50 backdrop-blur-lg border-b text-text" style="background-color: color-mix(in srgb, {{ theme.colors.card }} 82%, transparent); border-color: color-mix(in srgb, {{ theme.colors.text }} 18%, transparent);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-5">
                    <a href="/" class="text-xl md:text-2xl font-bold text-primary tracking-tight">Telegram Stremio</a>
                    {% if current_user %}
                    <div class="hidden md:flex items-center space-x-2 text-sm">
                        <a href="/" class="px-3 py-2 rounded-md hover:bg-white/5 transition-colors">Dashboard</a>
                        <a href="/media/manage" class="px-3 py-2 rounded-md hover:bg-white/5 transition-colors">Media</a>
                        <a href="/admin/dashboard" class="px-3 py-2 rounded-md hover:bg-white/5 transition-colors">Admin</a>
                        <a href="/admin/subscriptions" class="px-3 py-2 rounded-md hover:bg-white/5 transition-colors">Subscriptions</a>
                        <a href="/admin/access" class="px-3 py-2 rounded-md hover:bg-white/5 transition-colors">Access</a>
                    </div>
                    {% endif %}
                </div>

                <div class="flex items-center space-x-3">
                    <form method="post" action="/set-theme" id="theme-form">
                        <select name="theme" onchange="document.getElementById('theme-form').submit()"
                            class="theme-input rounded-md px-3 py-2 text-xs md:text-sm">
                            {% for theme_key, theme_data in themes.items() %}
                            <option value="{{ theme_key }}" {% if current_theme==theme_key %}selected{% endif %}>{{ theme_data.name }}</option>
                            {% endfor %}
                        </select>
                    </form>

                    {% if current_user %}
                    <span class="hidden sm:inline text-xs md:text-sm theme-text-secondary">{{ current_user }}</span>
                    <a href="/logout" class="bg-red-600 text-white px-3 md:px-4 py-2 rounded-md hover:bg-red-700 transition-colors text-sm">Logout</a>
                    {% else %}
                    <a href="/login" class="bg-primary hover:opacity-90 text-white px-3 md:px-4 py-2 rounded-md transition-opacity text-sm">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>

    <footer class="mt-auto border-t" style="background-color: color-mix(in srgb, {{ theme.colors.card }} 90%, transparent); border-color: color-mix(in srgb, {{ theme.colors.text }} 15%, transparent);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex flex-col sm:flex-row justify-between gap-3 sm:items-center">
                <p class="theme-text-secondary text-sm">© 2025 Telegram Stremio. All rights reserved.</p>
                <div class="flex space-x-4 text-sm">
                    <a href="/status" class="theme-text-secondary hover:text-primary transition-colors">Status</a>
                    <a href="/stremio" class="theme-text-secondary hover:text-primary transition-colors">Stremio Guide</a>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
